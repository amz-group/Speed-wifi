<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SpeedFlow Ultimate</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;800&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="glass-card">
        <div class="brand">SpeedFlow Ultimate</div>

        <div class="gauge-wrapper">
            <svg class="gauge-svg" viewBox="0 0 200 200">
                <defs>
                    <linearGradient id="gradient-dl" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" style="stop-color:#00f3ff;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#0077ff;stop-opacity:1" />
                    </linearGradient>
                    <linearGradient id="gradient-ul" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" style="stop-color:#bc13fe;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#8a00ff;stop-opacity:1" />
                    </linearGradient>
                </defs>

                <circle class="track-bg" cx="100" cy="100" r="70" stroke-dasharray="330 600" stroke-dashoffset="0" />

                <circle class="track-fill" id="track-fill" cx="100" cy="100" r="70" stroke-dasharray="330 600"
                    stroke-dashoffset="330" />

                <g class="needle-group" id="needle-group">
                    <polygon class="needle" points="100,96 155,100 100,104" />
                    <circle class="needle" cx="100" cy="100" r="5" />
                </g>
            </svg>
        </div>

        <div class="readout">
            <div class="speed-value" id="live-speed">0</div>
            <div class="unit">Mbps</div>
            <div class="status-pill" id="status-text">Ready</div>
        </div>

        <div class="stats-grid">
            <div class="stat-card" id="card-dl">
                <div class="stat-label">DOWNLOAD</div>
                <div class="stat-num" id="final-dl">--</div>
            </div>
            <div class="stat-card" id="card-ul">
                <div class="stat-label">UPLOAD</div>
                <div class="stat-num" id="final-ul">--</div>
            </div>
        </div>

        <button class="start-btn" id="start-btn" onclick="startTest()">Start Test</button>
    </div>

    <script src="script.js"></script>
</body>

</html>
